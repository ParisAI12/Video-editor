<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Web Video Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Simple Web Video Editor</h1>

<input type="file" id="video-input" accept="video/*">

<div class="editor">
    <video id="preview-video" controls></video>

    <div class="controls">
        <label>Start time (seconds)</label>
        <input type="number" id="in-time" value="0" step="0.1">

        <label>End time (seconds)</label>
        <input type="number" id="out-time" value="0" step="0.1">

        <label>Overlay text</label>
        <input type="text" id="overlay-text" placeholder="Enter caption">

        <button id="export-btn">Export Edited Video</button>
    </div>
</div>

<script src="editor.js"></script>
</body>
</html>
